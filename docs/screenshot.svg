<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="752" viewBox="0 0 1200 752" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <!-- UI preview (mockup) of Zotero Notebook — warm paper theme, rust accent. -->
  <defs>
    <clipPath id="win"><rect x="8" y="8" width="1184" height="736" rx="12"/></clipPath>
  </defs>
  <rect width="1200" height="752" fill="#dedbd2"/>
  <g clip-path="url(#win)">
    <rect x="8" y="8" width="1184" height="736" fill="#f7f6f3"/>

    <!-- Sidebar -->
    <rect x="8" y="8" width="264" height="736" fill="#fffefb"/>
    <line x1="272" y1="8" x2="272" y2="744" stroke="#e3e0d8" stroke-width="1"/>

    <!-- Logo -->
    <rect x="24" y="24" width="28" height="28" rx="6" fill="#a52f22"/>
    <text x="38" y="43" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">ZN</text>
    <text x="62" y="43" fill="#21201c" font-size="15" font-weight="600">Zotero Notebook</text>

    <!-- Nav -->
    <rect x="18" y="70" width="244" height="32" rx="7" fill="#f6e7e4"/>
    <rect x="28" y="80" width="12" height="12" rx="2" fill="none" stroke="#a52f22" stroke-width="1.5"/>
    <text x="50" y="90" fill="#a52f22" font-size="13.5" font-weight="500">All Papers</text>
    <text x="252" y="90" fill="#9b968a" font-size="12" text-anchor="end">128</text>

    <rect x="28" y="113" width="12" height="12" rx="2" fill="none" stroke="#6b675c" stroke-width="1.5"/>
    <text x="50" y="123" fill="#21201c" font-size="13.5">Unclassified</text>
    <rect x="226" y="111" width="26" height="17" rx="8.5" fill="#f7edd8"/>
    <text x="239" y="123.5" fill="#9a6b15" font-size="11" font-weight="600" text-anchor="middle">3</text>

    <rect x="28" y="146" width="12" height="14" rx="2" fill="none" stroke="#6b675c" stroke-width="1.5"/>
    <text x="50" y="156" fill="#21201c" font-size="13.5">Reading queue</text>
    <rect x="226" y="144" width="26" height="17" rx="8.5" fill="#f6e7e4"/>
    <text x="239" y="156.5" fill="#a52f22" font-size="11" font-weight="600" text-anchor="middle">5</text>

    <text x="28" y="196" fill="#9b968a" font-size="11" font-weight="600" letter-spacing="0.5">COLLECTIONS</text>

    <g fill="#21201c" font-size="13.5">
      <rect x="44" y="212" width="13" height="11" rx="2" fill="#a52f22" opacity="0.85"/>
      <text x="66" y="222">Computer Vision</text>
      <text x="252" y="222" fill="#9b968a" font-size="12" text-anchor="end">42</text>

      <rect x="60" y="240" width="13" height="11" rx="2" fill="#c9a59f"/>
      <text x="82" y="250" font-size="13">Diffusion Models</text>
      <text x="252" y="250" fill="#9b968a" font-size="12" text-anchor="end">18</text>

      <rect x="44" y="268" width="13" height="11" rx="2" fill="#a52f22" opacity="0.85"/>
      <text x="66" y="278">LLM Agents</text>
      <text x="252" y="278" fill="#9b968a" font-size="12" text-anchor="end">15</text>

      <rect x="44" y="296" width="13" height="11" rx="2" fill="#a52f22" opacity="0.85"/>
      <text x="66" y="306">NLP</text>
      <text x="252" y="306" fill="#9b968a" font-size="12" text-anchor="end">27</text>
    </g>

    <!-- Topbar -->
    <rect x="272" y="8" width="920" height="48" fill="#fffefb"/>
    <line x1="272" y1="56" x2="1192" y2="56" stroke="#e3e0d8" stroke-width="1"/>
    <rect x="288" y="20" width="360" height="24" rx="6" fill="#ffffff" stroke="#e3e0d8" stroke-width="1"/>
    <circle cx="304" cy="32" r="5" fill="none" stroke="#9b968a" stroke-width="1.4"/>
    <line x1="308" y1="36" x2="312" y2="40" stroke="#9b968a" stroke-width="1.4"/>
    <text x="320" y="36" fill="#9b968a" font-size="12.5">Search papers…</text>
    <rect x="600" y="25" width="44" height="15" rx="3" fill="#efede8"/>
    <text x="622" y="36" fill="#9b968a" font-size="10.5" text-anchor="middle">Ctrl K</text>

    <!-- cost pill -->
    <rect x="980" y="22" width="62" height="20" rx="10" fill="#efede8"/>
    <text x="993" y="36" fill="#6b675c" font-size="11.5" font-weight="600">$</text>
    <text x="1002" y="36" fill="#6b675c" font-size="11.5">0.42</text>
    <!-- status pill -->
    <rect x="1050" y="22" width="118" height="20" rx="10" fill="#e2f0e7"/>
    <circle cx="1063" cy="32" r="3.5" fill="#2f7d4f"/>
    <text x="1072" y="36" fill="#2f7d4f" font-size="11">Zotero · plugin v1.4.0</text>
    <circle cx="1180" cy="32" r="0" />

    <!-- New-imports banner -->
    <rect x="272" y="57" width="920" height="34" fill="#f6e7e4"/>
    <line x1="272" y1="91" x2="1192" y2="91" stroke="#e3e0d8" stroke-width="1"/>
    <text x="292" y="78" font-size="13"><tspan fill="#21201c" font-weight="600">3 new papers</tspan><tspan fill="#21201c"> imported into Zotero are still unclassified.</tspan></text>
    <rect x="1024" y="66" width="98" height="22" rx="6" fill="#a52f22"/>
    <text x="1073" y="81" fill="#ffffff" font-size="12" font-weight="500" text-anchor="middle">Classify now</text>
    <text x="1150" y="81" fill="#9b968a" font-size="14">✕</text>

    <!-- Library header -->
    <text x="292" y="124" fill="#21201c" font-size="18" font-weight="600">All Papers</text>
    <text x="392" y="124" fill="#6b675c" font-size="13.5">128 papers</text>

    <rect x="838" y="108" width="96" height="28" rx="7" fill="#fffefb" stroke="#e3e0d8" stroke-width="1"/>
    <text x="886" y="126" fill="#21201c" font-size="12.5" text-anchor="middle">Synthesize</text>
    <rect x="942" y="108" width="106" height="28" rx="7" fill="#fffefb" stroke="#e3e0d8" stroke-width="1"/>
    <text x="995" y="126" fill="#21201c" font-size="12.5" text-anchor="middle">Summarize 12</text>
    <rect x="1056" y="108" width="104" height="28" rx="7" fill="#fffefb" stroke="#e3e0d8" stroke-width="1"/>
    <text x="1108" y="126" fill="#21201c" font-size="12.5" text-anchor="middle">Check filing</text>

    <!-- Table header -->
    <line x1="272" y1="150" x2="1192" y2="150" stroke="#e3e0d8" stroke-width="1"/>
    <g fill="#9b968a" font-size="11" font-weight="600" letter-spacing="0.4">
      <text x="316" y="170">TITLE</text>
      <text x="900" y="170">STATUS</text>
      <text x="1040" y="170">YEAR</text>
      <text x="1100" y="170">ADDED</text>
    </g>
    <line x1="272" y1="182" x2="1192" y2="182" stroke="#e3e0d8" stroke-width="1"/>

    <!-- Rows -->
    <g>
      <!-- row 1 selected -->
      <rect x="272" y="182" width="920" height="52" fill="#f6e7e4" opacity="0.5"/>
      <rect x="292" y="202" width="13" height="13" rx="3" fill="#a52f22"/>
      <text x="316" y="204" fill="#21201c" font-size="13.5" font-weight="500">Denoising Diffusion Probabilistic Models</text>
      <text x="316" y="221" fill="#6b675c" font-size="11.5">Jonathan Ho, Ajay Jain, Pieter Abbeel · NeurIPS</text>
      <path d="M888 203 l3 6 6.5 .6 -5 4.4 1.5 6.4 -6-3.5 -6 3.5 1.5-6.4 -5-4.4 6.5-.6z" fill="#a52f22"/>
      <rect x="906" y="200" width="58" height="17" rx="8.5" fill="#f6e7e4"/>
      <text x="935" y="212.5" fill="#a52f22" font-size="10.5" font-weight="600" text-anchor="middle">Reading</text>
      <text x="1040" y="213" fill="#6b675c" font-size="13">2020</text>
      <text x="1100" y="213" fill="#9b968a" font-size="12">3d ago</text>
      <line x1="272" y1="234" x2="1192" y2="234" stroke="#e3e0d8" stroke-width="1"/>

      <!-- row 2 -->
      <rect x="292" y="254" width="13" height="13" rx="3" fill="none" stroke="#c9c5b9" stroke-width="1.4"/>
      <text x="316" y="256" fill="#21201c" font-size="13.5" font-weight="500">Attention Is All You Need</text>
      <text x="316" y="273" fill="#6b675c" font-size="11.5">Ashish Vaswani, Noam Shazeer +6 · NeurIPS</text>
      <rect x="906" y="252" width="58" height="17" rx="8.5" fill="#efede8"/>
      <text x="935" y="264.5" fill="#6b675c" font-size="10.5" font-weight="600" text-anchor="middle">To read</text>
      <text x="1040" y="265" fill="#6b675c" font-size="13">2017</text>
      <text x="1100" y="265" fill="#9b968a" font-size="12">1mo ago</text>
      <line x1="272" y1="286" x2="1192" y2="286" stroke="#e3e0d8" stroke-width="1"/>

      <!-- row 3 -->
      <rect x="292" y="306" width="13" height="13" rx="3" fill="none" stroke="#c9c5b9" stroke-width="1.4"/>
      <text x="316" y="308" fill="#21201c" font-size="13.5" font-weight="500">LoRA: Low-Rank Adaptation of Large Language Models</text>
      <text x="316" y="325" fill="#6b675c" font-size="11.5">Edward J. Hu, Yelong Shen +5 · ICLR</text>
      <rect x="906" y="304" width="44" height="17" rx="8.5" fill="#e2f0e7"/>
      <text x="928" y="316.5" fill="#2f7d4f" font-size="10.5" font-weight="600" text-anchor="middle">Read</text>
      <text x="1040" y="317" fill="#6b675c" font-size="13">2021</text>
      <text x="1100" y="317" fill="#9b968a" font-size="12">2mo ago</text>
      <line x1="272" y1="338" x2="1192" y2="338" stroke="#e3e0d8" stroke-width="1"/>

      <!-- row 4 -->
      <rect x="292" y="358" width="13" height="13" rx="3" fill="none" stroke="#c9c5b9" stroke-width="1.4"/>
      <text x="316" y="360" fill="#21201c" font-size="13.5" font-weight="500">ReAct: Synergizing Reasoning and Acting in LLMs</text>
      <text x="316" y="377" fill="#6b675c" font-size="11.5">Shunyu Yao, Jeffrey Zhao +4 · ICLR</text>
      <text x="1040" y="369" fill="#6b675c" font-size="13">2023</text>
      <text x="1100" y="369" fill="#9b968a" font-size="12">5d ago</text>
      <line x1="272" y1="390" x2="1192" y2="390" stroke="#e3e0d8" stroke-width="1"/>

      <!-- row 5 -->
      <rect x="292" y="410" width="13" height="13" rx="3" fill="none" stroke="#c9c5b9" stroke-width="1.4"/>
      <text x="316" y="412" fill="#21201c" font-size="13.5" font-weight="500">Segment Anything</text>
      <text x="316" y="429" fill="#6b675c" font-size="11.5">Alexander Kirillov, Eric Mintun +8 · ICCV</text>
      <path d="M888 411 l3 6 6.5 .6 -5 4.4 1.5 6.4 -6-3.5 -6 3.5 1.5-6.4 -5-4.4 6.5-.6z" fill="#a52f22"/>
      <rect x="906" y="408" width="58" height="17" rx="8.5" fill="#efede8"/>
      <text x="935" y="420.5" fill="#6b675c" font-size="10.5" font-weight="600" text-anchor="middle">To read</text>
      <text x="1040" y="421" fill="#6b675c" font-size="13">2023</text>
      <text x="1100" y="421" fill="#9b968a" font-size="12">1w ago</text>
      <line x1="272" y1="442" x2="1192" y2="442" stroke="#e3e0d8" stroke-width="1"/>

      <!-- row 6 -->
      <rect x="292" y="462" width="13" height="13" rx="3" fill="none" stroke="#c9c5b9" stroke-width="1.4"/>
      <text x="316" y="464" fill="#21201c" font-size="13.5" font-weight="500">Mamba: Linear-Time Sequence Modeling</text>
      <text x="316" y="481" fill="#6b675c" font-size="11.5">Albert Gu, Tri Dao · COLM</text>
      <text x="1040" y="473" fill="#6b675c" font-size="13">2024</text>
      <text x="1100" y="473" fill="#9b968a" font-size="12">today</text>
      <line x1="272" y1="494" x2="1192" y2="494" stroke="#e3e0d8" stroke-width="1"/>
    </g>

    <!-- floating synthesis callout -->
    <rect x="700" y="520" width="468" height="196" rx="10" fill="#ffffff" stroke="#e3e0d8" stroke-width="1"/>
    <rect x="700" y="520" width="468" height="40" rx="10" fill="#fffefb"/>
    <line x1="700" y1="560" x2="1168" y2="560" stroke="#e3e0d8" stroke-width="1"/>
    <rect x="716" y="533" width="13" height="14" rx="2" fill="#a52f22" opacity="0.85"/>
    <text x="738" y="544" fill="#21201c" font-size="13" font-weight="600">Synthesize</text>
    <text x="816" y="544" fill="#6b675c" font-size="12.5">· 3 selected · metadata + abstracts</text>

    <rect x="900" y="576" width="252" height="30" rx="8" fill="#f6e7e4"/>
    <text x="1140" y="595" fill="#21201c" font-size="12.5" text-anchor="end">Compare the methods across these papers</text>
    <text x="716" y="632" fill="#21201c" font-size="12.5">All three adapt large pretrained models with far</text>
    <text x="716" y="652" fill="#21201c" font-size="12.5">fewer trainable parameters. [Paper 1] freezes the</text>
    <text x="716" y="672" fill="#21201c" font-size="12.5">backbone and learns low-rank deltas, whereas</text>
    <text x="716" y="692" fill="#21201c" font-size="12.5">[Paper 3] re-parameterizes the state-space…</text>
  </g>
  <rect x="8.5" y="8.5" width="1183" height="735" rx="11.5" fill="none" stroke="#c9c5b9" stroke-width="1"/>
</svg>
