name: build

# Test, then build Zotero Notebook installers + the companion Zotero plugin
# and publish everything as assets on a single draft GitHub Release.
#
#   test   — headless: core Rust crate (mock-server tests), frontend
#            (tsc + vitest), plugin packaging. No GUI system deps needed.
#   build  — Tauri bundles per platform (Windows NSIS .exe is the primary
#            target), gated on test.
#   plugin — packages zotero-notebook.xpi and attaches it to the same
#            draft release.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # tauri-action + gh-release create/update the draft release

jobs:
  test:
    name: test (core + frontend + plugin)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          shared-key: test

      - name: Install npm dependencies
        working-directory: app
        run: npm ci

      - name: Package the Zotero plugin
        working-directory: app
        run: npm run build:plugin

      - name: Type-check frontend
        working-directory: app
        run: npx tsc --noEmit

      - name: Frontend tests (vitest)
        working-directory: app
        run: npm test

      # The core crate is headless (no GTK/WebKit) — plain cargo test works
      # without any apt packages.
      - name: Core Rust tests
        run: cargo test -p zn-core

  build:
    name: ${{ matrix.platform }} (${{ matrix.bundles }})
    runs-on: ${{ matrix.platform }}
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            bundles: nsis
            cache-key: windows-nsis
          - platform: ubuntu-latest
            bundles: deb,appimage
            cache-key: linux-deb-appimage
          - platform: macos-latest
            bundles: dmg
            cache-key: macos-dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.cache-key }}

      - name: Install Ubuntu system dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf \
            file

      - name: Install npm dependencies
        working-directory: app
        run: npm ci

      # tauri.conf.json's beforeBuildCommand packages the plugin xpi (a
      # bundled resource) and builds the frontend.
      - name: Build + upload (tauri-action)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: app
          tagName: app-v__VERSION__
          releaseName: "Zotero Notebook v__VERSION__"
          releaseBody: |
            Automated build from `${{ github.sha }}`.

            * **Windows** — `.exe` (NSIS installer) ← primary target
            * **Linux** — `.deb` / `.AppImage`
            * **macOS** — `.dmg`
            * **Zotero plugin** — `zotero-notebook.xpi` (install in Zotero 7:
              Tools → Plugins → gear → Install Plugin From File)

            See the [README](https://github.com/${{ github.repository }}#install) for setup.
          releaseDraft: true
          prerelease: false
          args: --bundles ${{ matrix.bundles }}

  plugin:
    name: plugin (.xpi)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install npm dependencies
        working-directory: app
        run: npm ci

      - name: Package the Zotero plugin
        working-directory: app
        run: npm run build:plugin

      - name: Read app version
        id: version
        run: echo "version=$(jq -r .version app/src-tauri/tauri.conf.json)" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zotero-notebook-xpi
          path: app/src-tauri/resources/zotero-notebook.xpi

      # Attach the .xpi to the same draft release tauri-action creates, so
      # users find the installer and the plugin in one place.
      - name: Attach .xpi to the draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: app-v${{ steps.version.outputs.version }}
          draft: true
          files: app/src-tauri/resources/zotero-notebook.xpi
